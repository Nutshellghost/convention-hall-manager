name: convention_hall_manager
description: "Kusetty Convention Hall Manager - Android app for managing bookings, payments, expenses, and reports."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: any
  table_calendar: any
  intl: any
  provider: any
  pdf: ^3.11.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  url_launcher: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
